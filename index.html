<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Verticalité — RH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --orange:#E8630A;--orange-light:#FFF3EB;--dark:#1A1A18;--mid:#4A4A47;
  --light:#8A8A86;--border:#E2E0D8;--bg:#F8F7F4;--white:#FFFFFF;
  --green:#2D7A3A;--green-light:#EAF4EC;--red:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--dark);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.logo{color:var(--orange);font-weight:700;font-size:1.05rem;}
.logo span{color:#888;font-size:.8rem;font-weight:400;margin-left:8px;}
#user-info{display:flex;align-items:center;gap:10px;color:#ccc;font-size:.85rem;}
#btn-logout{background:none;border:1px solid #555;color:#aaa;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:.8rem;}
#btn-logout:hover{border-color:var(--orange);color:var(--orange);}

/* ── NAV TABS ── */
nav{background:var(--white);border-bottom:1.5px solid var(--border);display:flex;gap:0;overflow-x:auto;}
nav button{background:none;border:none;padding:.9rem 1.5rem;font-size:.88rem;font-weight:600;color:var(--light);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
nav button.active{color:var(--orange);border-bottom-color:var(--orange);}
nav button:hover:not(.active){color:var(--mid);}

/* ── LOGIN ── */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-card h2{font-size:1.3rem;margin-bottom:.3rem;}
.login-card p{color:var(--light);font-size:.85rem;margin-bottom:1.5rem;}
.login-card .field{text-align:left;margin-bottom:1rem;}
.login-card label{font-size:.75rem;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.3rem;}
.login-card input{width:100%;height:44px;padding:0 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;outline:none;}
.login-card input:focus{border-color:var(--orange);}
.btn-primary{width:100%;height:44px;background:var(--orange);color:white;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.5rem;}
.btn-primary:hover{background:#D4560A;}
.error-msg{color:var(--red);font-size:.82rem;margin-top:.75rem;min-height:1rem;}

/* ── LAYOUT ── */
.screen{display:none;max-width:980px;margin:0 auto;padding:1.5rem;}
.screen.active{display:block;}

/* ── CARDS ── */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:.9rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.75rem;}
label.lbl{font-size:.75rem;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.06em;}
input[type=text]{height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;width:100%;}
input[type=text]:focus{border-color:var(--orange);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}

/* ── DAYS ── */
.day-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem;}
.day-head{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap;}
.day-name{font-size:.95rem;font-weight:700;color:var(--orange);min-width:85px;}
.day-date-inp{width:85px;height:34px;padding:0 8px;font-size:.85rem;border:1.5px solid var(--border);border-radius:6px;outline:none;}
.day-date-inp:focus{border-color:var(--orange);}
.chk-wrap{display:flex;align-items:center;gap:5px;}
.chk-wrap input[type=checkbox]{width:17px;height:17px;accent-color:var(--orange);}
.chk-wrap label{font-size:.72rem;color:var(--light);text-transform:uppercase;margin:0;}
.day-total-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;}
.day-total-wrap label.lbl{font-size:.72rem;margin:0;}
.day-total-inp{width:58px;height:34px;text-align:center;font-weight:700;color:var(--orange);border:1.5px solid var(--border);border-radius:6px;padding:0 4px;font-size:.9rem;outline:none;}
.auto-badge{font-size:.62rem;color:var(--light);}
.slot{display:grid;grid-template-columns:60px 1fr 1.5fr 1.4fr;gap:7px;align-items:center;margin-bottom:.4rem;}
.slot:last-child{margin-bottom:0;}
.slot-lbl{font-size:.7rem;font-weight:600;color:var(--light);text-transform:uppercase;}
.slot input{height:32px;font-size:.82rem;padding:0 8px;border:1.5px solid var(--border);border-radius:6px;outline:none;}
.slot input:focus{border-color:var(--orange);}

/* ── WEEK TOTAL ── */
.week-bar{background:var(--dark);color:white;border-radius:10px;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin:1rem 0;}
.week-bar .lbl{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:#bbb;}
.week-bar .val{font-size:1.7rem;font-weight:700;color:var(--orange);}

/* ── SIG ── */
.sig-wrap{position:relative;border:1.5px solid var(--border);border-radius:8px;background:#FAFAF8;overflow:hidden;width:100%;}
.sig-canvas{display:block;width:100%;height:100px;cursor:crosshair;touch-action:none;}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.8rem;color:#c4c4c0;pointer-events:none;transition:opacity .2s;}
.sig-actions{display:flex;gap:8px;margin-top:.4rem;}
.btn-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:.78rem;color:var(--mid);cursor:pointer;}
.btn-clear:hover{border-color:var(--red);color:var(--red);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:8px;padding:.7rem 1.4rem;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-orange{background:var(--orange);color:white;}.btn-orange:hover{background:#D4560A;}
.btn-dark{background:var(--dark);color:white;}.btn-dark:hover{background:#333;}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--mid);}.btn-outline:hover{border-color:var(--orange);color:var(--orange);}
.btn-green{background:var(--green);color:white;}.btn-green:hover{background:#236130;}
.actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.25rem;}

/* ── AGENDA / FICHES LIST ── */
.fiche-item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.6rem;display:flex;align-items:center;gap:12px;}
.fiche-item:hover{border-color:var(--orange);}
.fiche-week{font-weight:700;font-size:.92rem;flex:1;}
.fiche-meta{font-size:.78rem;color:var(--light);display:flex;gap:12px;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:600;}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-dark{background:#EBEBEB;color:var(--mid);}

/* ── RECAP TABLE ── */
.recap-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.recap-table th{background:var(--dark);color:white;padding:.6rem .8rem;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;}
.recap-table td{padding:.6rem .8rem;border-bottom:1px solid var(--border);}
.recap-table tr:hover td{background:#FFF8F5;}
.sup-positive{color:var(--orange);font-weight:700;}
.sup-negative{color:var(--green);font-weight:700;}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:1rem;text-align:center;}
.stat-val{font-size:1.6rem;font-weight:700;color:var(--orange);}
.stat-lbl{font-size:.72rem;color:var(--light);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:white;padding:.7rem 1.2rem;border-radius:10px;font-size:.88rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}

/* ── LOADER ── */
.loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--light);}
.empty .icon{font-size:2.5rem;margin-bottom:.5rem;}
.empty p{font-size:.9rem;}

@media(max-width:640px){
  .grid2,.grid3,.stats-grid{grid-template-columns:1fr;}
  .slot{grid-template-columns:55px 1fr;}
  .slot>*:nth-child(3),.slot>*:nth-child(4){grid-column:2;}
  nav button{padding:.75rem 1rem;font-size:.82rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">⚡ PRO VERTICALITÉ <span>Gestion RH</span></div>
  </div>
  <div id="user-info" style="display:none">
    <span id="user-nom"></span>
    <button id="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</header>

<!-- NAV -->
<nav id="main-nav" style="display:none">
  <button class="active" onclick="showTab('generateur')">📋 Générateur</button>
  <button onclick="showTab('agenda')">📅 Agenda</button>
  <button onclick="showTab('recap')">📊 Récap mensuel</button>
</nav>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div style="font-size:2rem;margin-bottom:.5rem">⚡</div>
    <h2>Pro Verticalité</h2>
    <p>Gestion des fiches d'heures</p>
    <div class="field">
      <label class="lbl">Identifiant</label>
      <input type="text" id="login-user" placeholder="ex: bermond" autocomplete="username">
    </div>
    <div class="field">
      <label class="lbl">Mot de passe</label>
      <input type="text" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- GENERATEUR -->
<div class="screen" id="screen-generateur">

  <div class="card">
    <div class="card-title">⚙️ Infos chantier</div>
    <div class="grid3">
      <div class="field"><label class="lbl">Chantier (défaut)</label><input type="text" id="chantier" placeholder="ex: CANOPÉE"></div>
      <div class="field"><label class="lbl">Chef chantier (défaut)</label><input type="text" id="chef" placeholder="ex: Julien"></div>
      <div class="field"><label class="lbl">Conducteur de travaux</label><input type="text" id="conducteur" placeholder="ex: GONCALVES Patrice"></div>
    </div>
    <div class="grid3">
      <div class="field"><label class="lbl">Semaine (libellé)</label><input type="text" id="semaine" placeholder="ex: du 25 au 29 mai 2026"></div>
      <div class="field"><label class="lbl">H. matin (défaut)</label><input type="text" id="defHM" value="7h - 12h"></div>
      <div class="field"><label class="lbl">H. après-midi (défaut)</label><input type="text" id="defHAM" value="13h - 16h"></div>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="applyDefaults()">↺ Appliquer par défaut</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📆 Jours de la semaine</div>
    <div id="days-container"></div>
    <div class="week-bar">
      <span class="lbl">Total semaine</span>
      <span class="val" id="week-total-val">39h</span>
    </div>
  </div>

  <div class="card" id="sig-card">
    <div class="card-title">✍️ Ma signature</div>
    <div class="field"><label class="lbl">Date de signature</label><input type="text" id="date-sig" placeholder="ex: 22/05/2026"></div>
    <div id="sig-wrap-container"></div>
    <div class="sig-actions"><button class="btn-clear" onclick="clearMySig()">Effacer</button></div>
  </div>

  <div class="actions">
    <button class="btn btn-orange" onclick="generateAndSave()">⬇ Générer PDF + Enregistrer</button>
    <button class="btn btn-dark" onclick="generateOnly()">⬇ PDF seulement</button>
  </div>
</div>

<!-- AGENDA -->
<div class="screen" id="screen-agenda">
  <div class="card">
    <div class="card-title">📅 Mes fiches enregistrées</div>
    <div id="agenda-list"><div class="empty"><div class="icon">📋</div><p>Chargement...</p></div></div>
  </div>
</div>

<!-- RECAP -->
<div class="screen" id="screen-recap">
  <div class="card">
    <div class="card-title">📊 Récapitulatif mensuel</div>
    <div class="grid2" style="margin-bottom:1rem">
      <div class="field">
        <label class="lbl">Mois</label>
        <select id="recap-mois" style="height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;background:white;">
          <option value="">Tous</option>
          <option>janvier</option><option>février</option><option>mars</option>
          <option>avril</option><option>mai</option><option>juin</option>
          <option>juillet</option><option>août</option><option>septembre</option>
          <option>octobre</option><option>novembre</option><option>décembre</option>
        </select>
      </div>
      <div class="field">
        <label class="lbl">Année</label>
        <input type="text" id="recap-annee" value="2026" placeholder="2026">
      </div>
    </div>
    <button class="btn btn-orange" onclick="loadRecap()">Afficher le récap</button>
  </div>
  <div id="recap-stats" style="display:none">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="card-title">Détail par semaine</div>
      <div style="overflow-x:auto"><table class="recap-table" id="recap-table">
        <thead><tr>
          <th>Semaine</th><th>Total heures</th><th>H. supplémentaires</th><th>IGD</th><th>Intempéries</th>
        </tr></thead>
        <tbody id="recap-tbody"></tbody>
      </table></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz9L4d5PBRt2jGf7ktLy1XW3JkgzJThVQY2kF8fp9dgNRmyi1sBnYUbC-JvDYIdxdKI8Q/exec';
const BASE_MIN = 39 * 60;
const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const DEF_HM  = ['7h - 12h','7h - 12h','7h - 12h','7h - 12h','7h - 12h','',''];
const DEF_HAM = ['13h - 16h','13h - 16h','13h - 16h','13h - 16h','13h - 15h','',''];

let token = localStorage.getItem('pv_token') || '';
let userNom = localStorage.getItem('pv_nom') || '';
let sigCanvas = null, sigCtx = null, sigHasData = false, sigDrawing = false;

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
async function doLogin() {
  const login = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value.trim();
  if (!login || !password) { showErr('Remplis tous les champs'); return; }
  document.getElementById('login-error').textContent = '';
  try {
    const res = await apiGet({ action: "login", login, password });
    if (!res.ok) { showErr(res.error || 'Identifiants incorrects'); return; }
    token = res.token; userNom = res.nom;
    localStorage.setItem('pv_token', token);
    localStorage.setItem('pv_nom', userNom);
    showApp();
  } catch(e) { showErr('Erreur réseau : ' + e.message); }
}
function showErr(msg) { document.getElementById('login-error').textContent = msg; }

function logout() {
  token = ''; userNom = '';
  localStorage.removeItem('pv_token'); localStorage.removeItem('pv_nom');
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('user-info').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
}

function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('user-info').style.display = 'flex';
  document.getElementById('user-nom').textContent = userNom;
  buildDays(); buildSigCanvas(); applyDefaults();
  showTab('generateur');
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function showTab(tab) {
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['generateur','agenda','recap'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'agenda') loadAgenda();
}

// ══════════════════════════════════════════
// HEURES UTILS
// ══════════════════════════════════════════
function parseRange(str) {
  if (!str) return 0;
  const m = str.replace(/\s/g,'').toLowerCase().match(/(\d{1,2})(?:h(\d{0,2}))?-(\d{1,2})(?:h(\d{0,2})?)/);
  if (!m) return 0;
  const h1=parseInt(m[1]||0), min1=parseInt(m[2]||0)||0;
  const h2=parseInt(m[3]||0), min2=parseInt(m[4]||0)||0;
  return Math.max(0, (h2*60+min2)-(h1*60+min1));
}
function parseTotalStr(str) {
  if (!str) return 0;
  const m = str.replace(/\s/g,'').toLowerCase().match(/(\d{1,2})(?:h(\d{0,2})?)/);
  return m ? parseInt(m[1]||0)*60+(parseInt(m[2]||0)||0) : 0;
}
function fmtH(mins) {
  if (!mins) return '0h';
  const h=Math.floor(mins/60), m=mins%60;
  return m===0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}`;
}
function computeDayMins(i) {
  const card = document.querySelector(`.day-card[data-idx="${i}"]`);
  if (!card) return 0;
  return parseRange(card.querySelector('.s-hm').value) + parseRange(card.querySelector('.s-ham').value);
}
function refreshDayTotal(i) {
  const card = document.querySelector(`.day-card[data-idx="${i}"]`);
  if (!card) return;
  const inp = card.querySelector('.d-total');
  const badge = card.querySelector('.auto-badge');
  if (inp.dataset.manual === '1') { badge.textContent = 'manuel'; refreshWeek(); return; }
  inp.value = fmtH(computeDayMins(i));
  badge.textContent = 'auto';
  refreshWeek();
}
function refreshWeek() {
  let total = 0;
  document.querySelectorAll('.day-card').forEach(card => {
    const inp = card.querySelector('.d-total');
    total += inp.dataset.manual === '1' ? parseTotalStr(inp.value) : computeDayMins(parseInt(card.dataset.idx));
  });
  document.getElementById('week-total-val').textContent = fmtH(total);
}

// ══════════════════════════════════════════
// BUILD DAYS
// ══════════════════════════════════════════
function buildDays() {
  const c = document.getElementById('days-container'); c.innerHTML = '';
  JOURS.forEach((jour, i) => {
    const card = document.createElement('div'); card.className = 'day-card'; card.dataset.idx = i;
    card.innerHTML = `
      <div class="day-head">
        <span class="day-name">${jour}</span>
        <input type="text" class="day-date-inp d-date" placeholder="JJ/MM">
        <div class="chk-wrap"><input type="checkbox" class="d-igd" id="igd${i}" ${i<5?'checked':''}><label for="igd${i}">IGD</label></div>
        <div class="chk-wrap"><input type="checkbox" class="d-intemp" id="intemp${i}"><label for="intemp${i}">Intempérie</label></div>
        <div class="day-total-wrap">
          <label class="lbl">Total</label>
          <input type="text" class="day-total-inp d-total" placeholder="0h">
          <span class="auto-badge">auto</span>
        </div>
      </div>
      <div class="slot">
        <span class="slot-lbl">Matin</span>
        <input type="text" class="s-chef-m" placeholder="Chef">
        <input type="text" class="s-chantier-m" placeholder="Chantier matin">
        <input type="text" class="s-hm" placeholder="7h - 12h" value="${DEF_HM[i]}">
      </div>
      <div class="slot">
        <span class="slot-lbl">Après-m.</span>
        <input type="text" class="s-chef-a" placeholder="Chef">
        <input type="text" class="s-chantier-a" placeholder="Chantier après-midi (si différent)">
        <input type="text" class="s-ham" placeholder="13h - 16h" value="${DEF_HAM[i]}">
      </div>`;
    c.appendChild(card);
    card.querySelector('.s-hm').addEventListener('input', () => refreshDayTotal(i));
    card.querySelector('.s-ham').addEventListener('input', () => refreshDayTotal(i));
    const totalInp = card.querySelector('.d-total');
    totalInp.addEventListener('input', () => {
      totalInp.dataset.manual = totalInp.value.trim() ? '1' : '';
      if (!totalInp.value.trim()) { totalInp.dataset.manual=''; refreshDayTotal(i); }
      else { card.querySelector('.auto-badge').textContent = 'manuel'; refreshWeek(); }
    });
    totalInp.addEventListener('dblclick', () => { totalInp.dataset.manual=''; refreshDayTotal(i); });
    refreshDayTotal(i);
  });
}

function applyDefaults() {
  const chantier = document.getElementById('chantier').value;
  const chef = document.getElementById('chef').value;
  const hm = document.getElementById('defHM').value;
  const ham = document.getElementById('defHAM').value;
  document.querySelectorAll('.day-card').forEach((card, i) => {
    if (i < 5) {
      if (chantier) { card.querySelector('.s-chantier-m').value = chantier; card.querySelector('.s-chantier-a').value = ''; }
      if (chef) { card.querySelector('.s-chef-m').value = chef; card.querySelector('.s-chef-a').value = chef; }
      card.querySelector('.s-hm').value = DEF_HM[i];
      card.querySelector('.s-ham').value = DEF_HAM[i];
      card.querySelector('.d-total').dataset.manual = '';
    }
    refreshDayTotal(parseInt(card.dataset.idx));

function getDayData() {
  return Array.from(document.querySelectorAll('.day-card')).map((card, i) => {
    const chM = card.querySelector('.s-chantier-m').value;
    const chA = card.querySelector('.s-chantier-a').value;
    const chantier = (chA && chA.trim() && chA.trim()!==chM.trim()) ? (chM?`${chM} / ${chA}`:chA) : chM;
    const cfM = card.querySelector('.s-chef-m').value;
    const cfA = card.querySelector('.s-chef-a').value;
    const chef = (cfA && cfA.trim() && cfA.trim()!==cfM.trim()) ? (cfM?`${cfM} / ${cfA}`:cfA) : cfM;
    const inp = card.querySelector('.d-total');
    const totalMins = inp.dataset.manual==='1' ? parseTotalStr(inp.value) : computeDayMins(i);
    return {
      date: card.querySelector('.d-date').value,
      chantier, chef,
      hm: card.querySelector('.s-hm').value,
      ham: card.querySelector('.s-ham').value,
      igd: card.querySelector('.d-igd').checked,
      intemperie: card.querySelector('.d-intemp').checked,
      total: inp.value,
      totalMins,
    };
  });
}

// ══════════════════════════════════════════
// SIGNATURE
// ══════════════════════════════════════════
function buildSigCanvas() {
  const container = document.getElementById('sig-wrap-container');
  const wrap = document.createElement('div'); wrap.className = 'sig-wrap';
  const hint = document.createElement('div'); hint.className = 'sig-hint'; hint.textContent = 'Signez ici avec le doigt ou la souris';
  const cv = document.createElement('canvas'); cv.className = 'sig-canvas';
  wrap.appendChild(hint); wrap.appendChild(cv);
  container.appendChild(wrap);
  sigCanvas = cv;

  function ensureSize() {
    const r = cv.getBoundingClientRect(); if (r.width === 0) return;
    const dpr = window.devicePixelRatio || 1;
    const tw = Math.round(r.width*dpr), th = Math.round(r.height*dpr);
    if (cv.width===tw && cv.height===th) return;
    let prev = null; if (sigHasData) { try { prev = cv.toDataURL(); } catch(e){} }
    cv.width = tw; cv.height = th;
    sigCtx = cv.getContext('2d');
    sigCtx.setTransform(dpr,0,0,dpr,0,0);
    sigCtx.lineWidth=2.2; sigCtx.lineCap='round'; sigCtx.lineJoin='round'; sigCtx.strokeStyle='#1A1A18';
    if (prev) { const img=new Image(); img.onload=()=>sigCtx.drawImage(img,0,0,r.width,r.height); img.src=prev; }
  }
  function getPos(e) {
    const r = cv.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx-r.left, y: cy-r.top };
  }
  function start(e) { e.preventDefault(); ensureSize(); sigDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); hint.style.opacity='0'; }
  function draw(e) { e.preventDefault(); if(!sigDrawing) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); sigHasData=true; }
  function stop() { sigDrawing=false; }
  cv.addEventListener('pointerdown',start); cv.addEventListener('pointermove',draw); window.addEventListener('pointerup',stop);
  requestAnimationFrame(()=>ensureSize()); setTimeout(()=>ensureSize(),150);
}

function clearMySig() {
  sigHasData = false;
  const dpr = window.devicePixelRatio||1;
  sigCtx.save(); sigCtx.setTransform(1,0,0,1,0,0); sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); sigCtx.restore();
  sigCtx.lineWidth=2.2; sigCtx.lineCap='round'; sigCtx.lineJoin='round'; sigCtx.strokeStyle='#1A1A18';
  document.querySelector('.sig-hint').style.opacity='1';
}

// ══════════════════════════════════════════
// PDF GENERATION
// ══════════════════════════════════════════
function buildPDF(days, semaine, conducteur, sigURL, dateCollab) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297, H=210, ml=8, mr=8, cw=W-ml-mr;

  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text("RELEVÉ D'HEURES HEBDOMADAIRES", W/2, 14, {align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7);
  doc.text('SAS PRO VERTICALITÉ  |  10 Avenue de Verdun, 06800 CAGNES SUR MER  |  04.12.05.20.20  |  secretariat@proverticalite.com', ml, 20);

  doc.setFont('helvetica','bold'); doc.setFontSize(9.5);
  doc.text('Collaborateur (Nom - Prénom) :', ml, 28);
  doc.setFont('helvetica','normal'); doc.text(userNom||'', ml+52, 28); doc.line(ml+51,29,ml+110,29);
  doc.setFont('helvetica','bold'); doc.text('Semaine :', ml+115, 28);
  doc.setFont('helvetica','normal'); doc.text(semaine||'', ml+132, 28); doc.line(ml+131,29,W-mr,29);

  const cols=[18,14,40,24,24,24,18,10,16,14,16];
  const headers=['JOURS','DATE','NOM DU CHANTIER','Chef chantier','H. MATIN','H. APRÈS-MIDI','Intempérie','IGD','ABSENCE','CONGÉ','TOTAL'];
  let y=34; const rowH=10, headH=12;

  doc.setFillColor(204,204,204); doc.rect(ml,y,cw,headH,'F'); doc.setDrawColor(0); doc.setLineWidth(0.3);
  let x=ml;
  headers.forEach((h,i) => {
    doc.rect(x,y,cols[i],headH); doc.setFont('helvetica','bold'); doc.setFontSize(6.8);
    const words=h.split(' ');
    if(words.length>1&&cols[i]<22){doc.text(words[0],x+cols[i]/2,y+5,{align:'center'});doc.text(words.slice(1).join(' '),x+cols[i]/2,y+9,{align:'center'});}
    else doc.text(h,x+cols[i]/2,y+headH/2+1.5,{align:'center'});
    x+=cols[i];
  });
  y+=headH;

  let totalMins=0;
  JOURS.forEach((jour,i) => {
    const d=days[i]||{}; x=ml;
    doc.setFillColor(255,255,255); doc.rect(ml,y,cw,rowH,'F');
    const vals=[jour,d.date||'',d.chantier||'',d.chef||'',d.hm||'',d.ham||'',d.intemperie?'X':'',d.igd?'X':'','','',d.total||''];
    vals.forEach((v,ci) => {
      doc.rect(x,y,cols[ci],rowH); doc.setFont('helvetica',ci===0?'bold':'normal');
      let fs=8.2; if((ci===2||ci===3)&&String(v).length>20)fs=6.2; else if((ci===2||ci===3)&&String(v).length>14)fs=7;
      doc.setFontSize(fs); doc.text(String(v),x+cols[ci]/2,y+rowH/2+1.5,{align:'center',maxWidth:cols[ci]-2});
      x+=cols[ci];
    });
    totalMins+=(d.totalMins||0); y+=rowH;
  });

  // Total row
  doc.setFillColor(204,204,204); doc.rect(ml,y,cw-cols[cols.length-1],8,'F'); doc.setLineWidth(0.5); doc.rect(ml,y,cw,8);
  doc.line(ml+cw-cols[cols.length-1],y,ml+cw-cols[cols.length-1],y+8);
  doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text("NOMBRE TOTAL D'HEURES :", ml+cw-cols[cols.length-1]-2, y+5.5, {align:'right'});
  doc.text(fmtH(totalMins), ml+cw-cols[cols.length-1]/2, y+5.5, {align:'center'});
  y+=8; doc.setLineWidth(0.3);

  doc.setFont('helvetica','oblique'); doc.setFontSize(7); doc.text('* = Cocher la case', ml, y+5); y+=10;

  // Sig collab
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('Signature du collaborateur - Nom :', ml, y);
  doc.setFont('helvetica','normal'); doc.text(userNom||'', ml+54, y);
  doc.setFont('helvetica','bold'); doc.text('Date :', W-mr-40, y);
  doc.setFont('helvetica','normal'); doc.text(dateCollab||'', W-mr-29, y); doc.line(W-mr-30,y+1,W-mr,y+1);
  doc.setDrawColor(150,150,150); doc.setFillColor(245,245,245); doc.rect(ml+50,y+2,70,18,'FD');
  if (sigURL) { try { doc.addImage(sigURL,'PNG',ml+51,y+3,68,16); } catch(e){} }
  else { doc.setFontSize(7); doc.setTextColor(180,180,180); doc.text('(signature)',ml+85,y+12,{align:'center'}); doc.setTextColor(0); }
  y+=22; doc.setDrawColor(0);

  // Sig conducteur
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('Signature du Conducteur de travaux - Nom :', ml, y);
  doc.setFont('helvetica','normal'); doc.text(conducteur||'', ml+68, y);
  doc.setFont('helvetica','bold'); doc.text('Date :', W-mr-40, y); doc.line(W-mr-30,y+1,W-mr,y+1);
  doc.setDrawColor(150,150,150); doc.setFillColor(245,245,245); doc.rect(ml+50,y+2,70,18,'FD');
  doc.setFontSize(7); doc.setTextColor(180,180,180); doc.text('(à signer par le conducteur)',ml+85,y+12,{align:'center'});
  doc.setTextColor(0); doc.setDrawColor(0);
  return doc;
}

async function generateAndSave() {
  const days = getDayData();
  const semaine = document.getElementById('semaine').value;
  const conducteur = document.getElementById('conducteur').value;
  const dateCollab = document.getElementById('date-sig').value;
  const sigURL = sigHasData ? sigCanvas.toDataURL('image/png') : null;

  if (!semaine) { showToast('Renseigne le libellé de la semaine !','error'); return; }

  // Generate PDF
  const doc = buildPDF(days, semaine, conducteur, sigURL, dateCollab);
  const safe = s => (s||'fiche').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'');
  doc.save(`${safe(userNom)}_${safe(semaine).slice(0,20)}.pdf`);

  // Save to Sheets
  showToast('Enregistrement...','info');
  try {
    const fiche = { semaine, jours: days };
    const res = await apiGet({ action: "saveFiche", token, fiche: encodeURIComponent(JSON.stringify(fiche)) });
    if (res.ok) showToast('✓ PDF téléchargé + fiche enregistrée !');
    else showToast('PDF ok, mais erreur sauvegarde : ' + res.error, 'error');
  } catch(e) { showToast('PDF ok, erreur réseau : ' + e.message, 'error'); }
}

function generateOnly() {
  const days = getDayData();
  const semaine = document.getElementById('semaine').value;
  const conducteur = document.getElementById('conducteur').value;
  const dateCollab = document.getElementById('date-sig').value;
  const sigURL = sigHasData ? sigCanvas.toDataURL('image/png') : null;
  const doc = buildPDF(days, semaine, conducteur, sigURL, dateCollab);
  const safe = s => (s||'fiche').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'');
  doc.save(`${safe(userNom)}_${safe(semaine).slice(0,20)}.pdf`);
}

async function loadAgenda() {
  const list = document.getElementById('agenda-list');
  list.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Chargement...</p></div>';
  try {
    const res = await apiGet({ action:'getfiches', token });
    if (!res.ok) { list.innerHTML = `<div class="empty"><p>${res.error}</p></div>`; return; }
    if (!res.fiches || res.fiches.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">📋</div><p>Aucune fiche enregistrée pour l\'instant.</p></div>'; return;
    }
    list.innerHTML = '';
    [...res.fiches].reverse().forEach(f => {
      const item = document.createElement('div'); item.className = 'fiche-item';
      const totalMins = f.totalMins || 0;
      const supMins = Math.max(0, totalMins - BASE_MIN);
      item.innerHTML = `
        <div style="flex:1">
          <div class="fiche-week">${f.semaine || '—'}</div>
          <div class="fiche-meta" style="margin-top:4px">
            <span>🕐 ${f.totalH || fmtH(totalMins)}</span>
            <span>📍 ${f.chantiers || '—'}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          <span class="badge badge-orange">IGD : ${f.igd || 0}j</span>
          <span class="badge badge-dark">Intempéries : ${f.intemperies || 0}j</span>
          ${supMins > 0 ? `<span class="badge badge-green">+${fmtH(supMins)} sup</span>` : ''}
        </div>`;
      list.appendChild(item);
    });
  } catch(e) { list.innerHTML = `<div class="empty"><p>Erreur : ${e.message}</p></div>`; }
}

async function loadRecap() {
  const mois = document.getElementById('recap-mois').value;
  const annee = document.getElementById('recap-annee').value;
  try {
    const res = await apiGet({ action:'getRecap', token, mois, annee });
    if (!res.ok) { showToast(res.error, 'error'); return; }
    const data = res.recap || [];
    document.getElementById('recap-stats').style.display = 'block';

    // Stats globales
    const totalMins = data.reduce((s,r) => s+(r.totalMins||0), 0);
    const supMins = data.reduce((s,r) => s+(r.heuresSupMins||0), 0);
    const igd = data.reduce((s,r) => s+(r.igd||0), 0);
    const intemp = data.reduce((s,r) => s+(r.intemperies||0), 0);

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-val">${fmtH(totalMins)}</div><div class="stat-lbl">Total heures</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${supMins>0?'var(--orange)':'var(--green)'}">${supMins>0?'+':''}${fmtH(supMins)}</div><div class="stat-lbl">Heures supp.</div></div>
      <div class="stat-card"><div class="stat-val">${igd}</div><div class="stat-lbl">Jours IGD</div></div>
      <div class="stat-card"><div class="stat-val">${intemp}</div><div class="stat-lbl">Jours intempéries</div></div>`;

    const tbody = document.getElementById('recap-tbody'); tbody.innerHTML = '';
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--light);padding:2rem">Aucune donnée pour cette période</td></tr>';
    } else {
      data.forEach(r => {
        const sup = r.heuresSupMins || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.semaine}</td>
          <td>${r.totalH || fmtH(r.totalMins)}</td>
          <td class="${sup>0?'sup-positive':'sup-negative'}">${sup>0?'+':''}${fmtH(sup)}</td>
          <td>${r.igd || 0} j</td>
          <td>${r.intemperies || 0} j</td>`;
        tbody.appendChild(tr);
      });
    }
  } catch(e) { showToast('Erreur : '+e.message,'error'); }
}

// ══════════════════════════════════════════
// API HELPERS — JSONP (contourne CORS)
// ══════════════════════════════════════════
function apiGet(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Math.random().toString(36).slice(2);
    params.callback = cbName;
    const qs = Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v==null?'':v)}`).join('&');
    const script = document.createElement('script');
    let done = false;
    window[cbName] = (data) => {
      done = true;
      delete window[cbName];
      try { document.head.removeChild(script); } catch(e) {}
      resolve(data);
    };
    script.src = `${API}?${qs}`;
    script.onerror = () => { done=true; reject(new Error('Erreur réseau')); };
    document.head.appendChild(script);
    setTimeout(() => { if(!done){ done=true; reject(new Error('Timeout')); } }, 12000);
  });
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type==='error'?' error':'') + ' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}
